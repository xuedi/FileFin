name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # ffmpeg/ffprobe let the transcode and optimize tests run instead of skipping.
      # GPU (VAAPI) tests still self-skip without a render node.
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # The binary embeds web/dist (all:dist). Tests exercising the SPA fallback need the real
      # index.html, not the committed .gitkeep stub, so build the frontend before the Go steps.
      - name: Build frontend
        run: npm ci --prefix web && npm run build --prefix web

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...
